<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Revit Version Checker — Autodesk Forma / ACC</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #212121;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --hint: #555;
    --blue: #1473E6;
    --blue-light: #378AFF;
    --blue-dim: rgba(20,115,230,0.15);
    --green: #1D9E75;
    --green-dim: rgba(29,158,117,0.15);
    --amber: #EF9F27;
    --amber-dim: rgba(239,159,39,0.15);
    --red: #E24B4A;
    --red-dim: rgba(226,75,74,0.15);
    --purple: #7F77DD;
    --purple-dim: rgba(127,119,221,0.15);
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, sans-serif; font-size: 14px; line-height: 1.6; }
  body { min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    background: #0a0a0a;
    border-bottom: 0.5px solid var(--border);
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 28px; height: 28px; background: var(--blue); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 16px; height: 16px; }
  .app-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .app-sub { font-size: 12px; color: var(--muted); padding-left: 10px; border-left: 0.5px solid var(--border2); margin-left: 2px; }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: 20px; padding: 4px 12px 4px 6px; cursor: default;
  }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--blue-dim); border: 1px solid var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: var(--blue-light);
  }
  .user-name { font-size: 12px; color: var(--muted); }

  /* LAYOUT */
  .shell { display: flex; min-height: calc(100vh - 52px); }
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    padding: 20px 0;
    display: flex; flex-direction: column;
  }
  .content { flex: 1; padding: 24px; overflow-x: hidden; }

  /* SIDEBAR NAV */
  .sidebar-section { padding: 0 16px; margin-bottom: 20px; }
  .sidebar-label {
    font-size: 10px; font-weight: 600; color: var(--hint);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius);
    font-size: 13px; color: var(--muted); cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border: none; background: transparent; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--blue-dim); color: var(--blue-light); }
  .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .nav-divider { height: 0.5px; background: var(--border); margin: 8px 16px; }

  /* STEP INDICATOR */
  .steps { display: flex; align-items: center; gap: 0; margin-bottom: 28px; }
  .step {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--hint);
  }
  .step.done { color: var(--green); }
  .step.active { color: var(--text); }
  .step-num {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .step.done .step-num { background: var(--green); border-color: var(--green); color: #fff; }
  .step-line { flex: 1; height: 0.5px; background: var(--border); margin: 0 10px; max-width: 40px; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; }

  /* FORMS */
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .field input, .field select {
    height: 36px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    padding: 0 12px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.15s;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
  .field input::placeholder { color: var(--hint); }
  .field select option { background: #1a1a1a; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* BUTTONS */
  .btn {
    height: 36px; padding: 0 16px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; font-family: inherit;
    cursor: pointer; border: none; transition: all 0.15s; display: inline-flex;
    align-items: center; gap: 6px; white-space: nowrap;
  }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-blue:hover { background: var(--blue-light); }
  .btn-blue:disabled { opacity: 0.4; cursor: default; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 0.5px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
  .btn-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ALERT */
  .alert {
    border-radius: var(--radius);
    padding: 10px 14px; font-size: 13px;
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 14px; line-height: 1.5;
  }
  .alert-info { background: var(--blue-dim); border: 0.5px solid rgba(20,115,230,0.3); color: #7ab4f5; }
  .alert-warn { background: var(--amber-dim); border: 0.5px solid rgba(239,159,39,0.3); color: #f5c96a; }
  .alert-err  { background: var(--red-dim);   border: 0.5px solid rgba(226,75,74,0.3);  color: #f5a09f; }
  .alert svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

  /* GRID ITEMS */
  .grid-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
  .grid-item {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    text-align: left;
  }
  .grid-item:hover { border-color: var(--blue); background: var(--blue-dim); }
  .grid-item-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .grid-item-sub { font-size: 11px; color: var(--hint); }

  /* BREADCRUMB */
  .breadcrumb { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 18px; }
  .breadcrumb a { font-size: 12px; color: var(--muted); cursor: pointer; }
  .breadcrumb a:hover { color: var(--text); }
  .breadcrumb .crumb-active { font-size: 12px; color: var(--text); font-weight: 500; }
  .breadcrumb .sep { font-size: 12px; color: var(--hint); }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .metric {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px;
  }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .metric-val { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--hint); margin-top: 4px; }

  /* PROGRESS */
  .scan-progress {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
  }
  .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .progress-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .progress-pct { font-size: 13px; font-weight: 600; color: var(--blue-light); }
  .progress-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s ease; }
  .progress-msg { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .progress-stats { font-size: 11px; color: var(--hint); margin-top: 8px; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 1.5px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABLE */
  .table-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  .table-header {
    padding: 14px 18px;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
  }
  .table-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .count-badge {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 10px; padding: 1px 8px;
    font-size: 11px; color: var(--muted);
  }
  .table-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; color: var(--hint); pointer-events: none; }
  .search-input {
    height: 28px; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    padding: 0 10px 0 26px; font-size: 12px; font-family: inherit;
    outline: none; width: 160px;
  }
  .search-input:focus { border-color: var(--blue); }
  .filter-select {
    height: 28px; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    padding: 0 8px; font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
  }
  .filter-select option { background: #1a1a1a; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th {
    padding: 9px 16px; text-align: left;
    font-size: 10px; font-weight: 600; color: var(--hint);
    text-transform: uppercase; letter-spacing: 0.08em;
    background: var(--surface2); border-bottom: 0.5px solid var(--border);
    cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--muted); }
  tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 16px; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-name { width: 30%; }
  .col-path { width: 22%; }
  .col-ver  { width: 11%; }
  .col-mod  { width: 15%; }
  .col-user { width: 13%; }
  .col-size { width: 9%; }

  /* VER BADGES */
  .ver-badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 2px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .ver-new   { background: var(--green-dim);  color: #4ecba3; border: 0.5px solid rgba(29,158,117,0.3); }
  .ver-curr  { background: var(--blue-dim);   color: #7ab4f5; border: 0.5px solid rgba(20,115,230,0.3); }
  .ver-old1  { background: var(--amber-dim);  color: #f5c96a; border: 0.5px solid rgba(239,159,39,0.3); }
  .ver-old2  { background: var(--red-dim);    color: #f5a09f; border: 0.5px solid rgba(226,75,74,0.3); }
  .ver-none  { background: var(--surface2);   color: var(--hint); border: 0.5px solid var(--border); }

  /* FILE CELL */
  .file-cell { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .rvt-icon { width: 28px; height: 28px; border-radius: 5px; background: var(--blue-dim); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .rvt-icon span { font-size: 8px; font-weight: 700; color: var(--blue-light); letter-spacing: 0.03em; }
  .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-ws { font-size: 10px; color: var(--purple); background: var(--purple-dim); border-radius: 4px; padding: 0 4px; margin-left: 4px; flex-shrink: 0; }

  /* PATH CELL */
  .path-cell { font-size: 11px; color: var(--hint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* EMPTY */
  .empty { padding: 60px 20px; text-align: center; }
  .empty-icon { width: 48px; height: 48px; margin: 0 auto 14px; opacity: 0.15; }
  .empty-title { font-size: 14px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
  .empty-sub { font-size: 13px; color: var(--hint); }

  /* FOLDER CHIPS */
  .folder-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .folder-chip {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 5px 10px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .folder-chip:hover { border-color: var(--blue); color: var(--text); }
  .folder-chip svg { width: 12px; height: 12px; }

  /* VER LEGEND */
  .ver-legend { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* TOOLTIP-LIKE path truncation on hover handled by title attr */

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .field-row { grid-template-columns: 1fr; }
    .col-path, .col-size, .col-user { display: none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="white"><path d="M2 12L5.5 3h2l3.5 9H9l-.8-2.2H5.8L5 12H2zm4.5-7L5.1 8.4h2.8L6.5 5z"/><rect x="10" y="3" width="1.2" height="9" fill="white" opacity="0.5"/><rect x="12" y="3" width="1.8" height="9" rx="0.4" fill="white" opacity="0.8"/></svg>
    </div>
    <span class="app-name">Revit Version Checker</span>
    <span class="app-sub">Autodesk Forma / ACC</span>
  </div>
  <div id="topbar-right"></div>
</div>

<div class="shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Navigate</div>
      <button class="nav-item active" id="nav-scan" onclick="navClick('scan')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 4h14v1.5H1zm0 3h14v1.5H1zm0 3h9v1.5H1z"/></svg>
        Scan files
      </button>
      <button class="nav-item" id="nav-about" onclick="navClick('about')">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 7v5M8 5v1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        About
      </button>
    </div>
    <div class="nav-divider"></div>
    <div class="sidebar-section" id="sidebar-tree"></div>
    <div style="flex:1"></div>
    <div class="sidebar-section" style="margin-bottom:0">
      <a class="nav-item" href="https://github.com/tsb2127/revit-version-checker" target="_blank" style="text-decoration:none">

        GitHub
      </a>
      <a class="nav-item" href="https://aps.autodesk.com" target="_blank" style="text-decoration:none">

  <main class="content" id="main-content"></main>

<script>
const APS = 'https://developer.api.autodesk.com';

const state = {
  phase: 'setup',        // setup | selectHub | selectProject | browse | about
  token: localStorage.getItem('rvt_token') || '',
  userName: localStorage.getItem('rvt_username') || '',
  hubs: [], selectedHub: null,
  projects: [], selectedProject: null,
  topFolders: [], folderPath: [],
  files: [],
  scanning: false, scanProgress: 0, scanMsg: '', scanTotal: 0, scanDone: 0,
  filterVer: 'all', filterSearch: '',
  sortCol: 'name', sortDir: 1,
  error: null,
  scanAborted: false
};

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(APS + path, { headers: { Authorization: 'Bearer ' + state.token } });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText + ' — ' + path);
  return r.json();
}

// ─── RECURSIVE SCAN ──────────────────────────────────────────────────────────
async function scanFolder(projectId, folderId, pathLabel) {
  if (state.scanAborted) return;
  let contents;
  try {
    const d = await api('/data/v1/projects/' + projectId + '/folders/' + folderId + '/contents');
    contents = d.data || [];
  } catch(e) {
    console.warn('Could not read folder', folderId, e.message);
    return;
  }

  const subFolders = contents.filter(i => i.type === 'folders');
  const rvtItems = contents.filter(i =>
    i.type === 'items' &&
    i.attributes && i.attributes.displayName &&
    i.attributes.displayName.toLowerCase().endsWith('.rvt')
  );

  state.scanTotal += rvtItems.length;
  render();

  for (const item of rvtItems) {
    if (state.scanAborted) return;
    state.scanMsg = item.attributes.displayName;
    render();
    try {
      const vd = await api('/data/v1/projects/' + projectId + '/items/' + encodeURIComponent(item.id) + '/versions');
      const latest = (vd.data || [])[0];
      const attr = latest && latest.attributes;
      const ext = attr && attr.extension && attr.extension.data;
      state.files.push({
        id: item.id,
        name: item.attributes.displayName,
        path: pathLabel,
        revitVersion: ext && ext.revitProjectVersion ? String(ext.revitProjectVersion) : null,
        versionNumber: attr && attr.versionNumber,
        modifiedTime: attr && attr.lastModifiedTime,
        modifiedBy: attr && attr.lastModifiedUserName,
        size: attr && attr.storageSize,
        isWorkshared: !!(ext && ext.isCompositeDesign),
        error: false
      });
    } catch(e) {
      state.files.push({ id: item.id, name: item.attributes.displayName, path: pathLabel, revitVersion: null, error: true });
    }
    state.scanDone++;
    state.scanProgress = state.scanTotal > 0 ? Math.round((state.scanDone / state.scanTotal) * 100) : 0;
    render();
  }

  for (const folder of subFolders) {
    if (state.scanAborted) return;
    const subName = folder.attributes.displayName || folder.attributes.name || folder.id;
    await scanFolder(projectId, folder.id, pathLabel + ' / ' + subName);
  }
}

async function startScan(folderId, folderName) {
  state.files = [];
  state.scanning = true;
  state.scanAborted = false;
  state.scanProgress = 0;
  state.scanTotal = 0;
  state.scanDone = 0;
  state.scanMsg = 'Starting scan...';
  state.error = null;
  render();
  try {
    await scanFolder(state.selectedProject.id, folderId, folderName);
  } catch(e) {
    state.error = 'Scan error: ' + e.message;
  }
  state.scanning = false;
  if (!state.scanAborted) state.scanProgress = 100;
  render();
}

// ─── LOAD HELPERS ─────────────────────────────────────────────────────────────
async function loadHubs() {
  state.scanning = false; state.error = null;
  try {
    const d = await api('/project/v1/hubs');
    state.hubs = d.data || [];
    if (state.hubs.length === 1) {
      selectHub(state.hubs[0].id, state.hubs[0].attributes.name);
      return;
    }
    state.phase = 'selectHub'; render();
  } catch(e) { state.error = 'Could not load hubs — check your token. ' + e.message; render(); }
}

  state.selectedHub = { id, name };

}

function selectProject(id, name) {
  state.selectedProject = { id, name };

    state.topFolders = d.data || [];
    render();
  }).catch(e => { state.error = e.message; render(); });
}

// ─── VERSION COLOUR ──────────────────────────────────────────────────────────
function verClass(v, latestVer) {
  if (!v) return 'ver-none';
  const n = parseInt(v), l = parseInt(latestVer || v);
  if (n >= l)   return 'ver-new';
  if (n === l-1) return 'ver-curr';
  if (n === l-2) return 'ver-old1';
  return 'ver-old2';
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
}
function fmtSize(b) {
  if (!b) return '—';
  return b >= 1048576 ? (b/1048576).toFixed(1)+' MB' : Math.round(b/1024)+' KB';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    let av = a[state.sortCol]||'', bv = b[state.sortCol]||'';

    return av < bv ? -state.sortDir : av > bv ? state.sortDir : 0;

            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 4.5A1.5 1.5 0 012.5 3H6l1.5 1.5H13.5A1.5 1.5 0 0115 6v6a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 12V4.5z"/></svg>

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  // topbar user chip
  const tr = document.getElementById('topbar-right');
  if (state.userName && state.token) {
    const initials = state.userName.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    tr.innerHTML = `<div class="user-chip"><div class="avatar">${initials}</div><span class="user-name">${escHtml(state.userName)}</span></div>`;
  } else { tr.innerHTML = ''; }

  // sidebar tree (project context)
  const st = document.getElementById('sidebar-tree');
  if (state.selectedProject) {
    st.innerHTML = `<div class="sidebar-label">Context</div>
      <div style="padding:6px 10px;font-size:12px;color:var(--muted)">
        <div style="color:var(--text);font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(state.selectedProject.name)}</div>
        <div style="font-size:11px;color:var(--hint)">${escHtml(state.selectedHub&&state.selectedHub.name||'')}</div>
        ${state.files.length > 0 ? `<div style="margin-top:6px;font-size:11px;color:var(--green)">${state.files.length} RVT files scanned</div>` : ''}
      </div>`;
  } else { st.innerHTML = ''; }

  // update nav active state
  ['scan','about'].forEach(k => {
    const el = document.getElementById('nav-'+k);
    if (el) el.className = 'nav-item' + (state.phase===k||((k==='scan')&&['setup','selectHub','selectProject','browse'].includes(state.phase)) ? ' active' : '');
  });

  const mc = document.getElementById('main-content');
  let html = '';
  if (state.error) html += `<div class="alert alert-err">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 4h1.5v5h-1.5V5zm0 6h1.5v1.5h-1.5V11z"/></svg>
    <span>${escHtml(state.error)} <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="state.error=null;render()">Dismiss</button></span>
  </div>`;
  if (state.phase === 'setup')         html += renderSetup();
  else if (state.phase === 'selectHub')    html += renderHubs();
  else if (state.phase === 'selectProject') html += renderProjects();
  else if (state.phase === 'browse')   html += renderBrowse();
  else if (state.phase === 'about')    html += renderAbout();
  mc.innerHTML = html;
  bindEvents();
}

function bindEvents() {
  const bc = document.getElementById('btn-connect');
  if (bc) bc.onclick = () => {
    state.token = document.getElementById('inp-token').value.trim();
    state.userName = document.getElementById('inp-name').value.trim() || 'ACC User';
    if (!state.token) { state.error = 'Please enter an access token.'; render(); return; }
    localStorage.setItem('rvt_token', state.token);
    localStorage.setItem('rvt_username', state.userName);
    loadHubs();
  };
  const bd = document.getElementById('btn-demo');
  if (bd) bd.onclick = loadDemo;
  const bclr = document.getElementById('btn-clear');
  if (bclr) bclr.onclick = () => {
    localStorage.removeItem('rvt_token'); localStorage.removeItem('rvt_username');
    state.token = ''; state.userName = ''; render();
  };
}

window.navClick = (k) => { state.phase = k; state.error = null; render(); };
window.backTo = (to) => {
  state.error = null;
  if (to === 'setup')   { state.phase = 'setup'; }
  if (to === 'hub')     { state.phase = 'selectHub'; }
  if (to === 'project') { state.phase = 'selectProject'; state.files = []; state.topFolders = []; state.folderPath = []; state.scanning = false; }
  render();
};
window.navPath = (i) => {
  const f = state.folderPath[i];
  state.folderPath = state.folderPath.slice(0, i+1);
  state.files = [];
  startScan(f.id, f.name);
};
window.sort = (col) => {
  if (state.sortCol === col) state.sortDir *= -1; else { state.sortCol = col; state.sortDir = 1; }
  render();
};
window.abortScan = () => { state.scanAborted = true; state.scanning = false; render(); };
window.startScan = startScan;
window.selectHub = selectHub;
window.selectProject = selectProject;

window.exportCsv = () => {
  const rows = [['File name','Path','Revit version','Workshared','Version #','Last modified','Modified by','Size (bytes)']];
  state.files.forEach(f => rows.push([f.name, f.path||'', f.revitVersion||'', f.isWorkshared?'Yes':'No', f.versionNumber||'', f.modifiedTime||'', f.modifiedBy||'', f.size||'']));
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'revit-versions-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
};

render();
</script>
</body>
</html>
