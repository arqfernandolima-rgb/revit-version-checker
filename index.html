<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Revit Version Checker — Autodesk Forma / ACC</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0f0f0f;--surface:#181818;--surface2:#212121;--surface3:#252525;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--muted:#888;--hint:#4a4a4a;
  --blue:#1473E6;--blue-light:#378AFF;--blue-dim:rgba(20,115,230,0.14);
  --green:#1D9E75;--green-dim:rgba(29,158,117,0.14);
  --amber:#EF9F27;--amber-dim:rgba(239,159,39,0.13);
  --red:#E24B4A;--red-dim:rgba(226,75,74,0.12);
  --purple:#7F77DD;--purple-dim:rgba(127,119,221,0.13);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;font-size:14px;line-height:1.6}
body{min-height:100vh}

.topbar{background:#0a0a0a;border-bottom:0.5px solid var(--border);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:11px}
.logo{width:26px;height:26px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:15px;height:15px}
.app-name{font-size:13px;font-weight:600;letter-spacing:-0.01em}
.app-sub{font-size:11px;color:var(--muted);padding-left:9px;border-left:0.5px solid var(--border2);margin-left:1px}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:3px 11px 3px 5px}
.ava{width:22px;height:22px;border-radius:50%;background:var(--blue-dim);border:1px solid rgba(20,115,230,0.4);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--blue-light)}
.uname{font-size:12px;color:var(--muted)}

.shell{display:flex;min-height:calc(100vh - 50px)}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:0.5px solid var(--border);padding:18px 0;display:flex;flex-direction:column}
.content{flex:1;padding:22px;overflow-x:hidden;min-width:0}
.ss{padding:0 14px;margin-bottom:18px}
.slabel{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px}
.ni{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:var(--r);font-size:13px;color:var(--muted);cursor:pointer;transition:background 0.12s,color 0.12s;border:none;background:transparent;width:100%;text-align:left;text-decoration:none}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.active{background:var(--blue-dim);color:var(--blue-light)}
.ni svg{width:13px;height:13px;flex-shrink:0}
.ndiv{height:0.5px;background:var(--border);margin:7px 14px}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.field label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em}
.field input,.field select{height:34px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);padding:0 11px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.12s}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.field input::placeholder{color:var(--hint)}
.field select option{background:#1a1a1a}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}

.btn{height:34px;padding:0 15px;border-radius:var(--r);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all 0.12s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-light)}
.btn-g{background:transparent;color:var(--muted);border:0.5px solid var(--border2)}
.btn-g:hover{background:var(--surface2);color:var(--text)}
.btn-sm{height:26px;padding:0 9px;font-size:11px}
.btn-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}

.alert{border-radius:var(--r);padding:9px 13px;font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:13px;line-height:1.55}
.alert svg{width:13px;height:13px;flex-shrink:0;margin-top:1px}
.a-info{background:var(--blue-dim);border:0.5px solid rgba(20,115,230,0.28);color:#7ab4f5}
.a-warn{background:rgba(239,159,39,0.08);border:0.5px solid rgba(239,159,39,0.24);color:#c9a44a}
.a-err{background:var(--red-dim);border:0.5px solid rgba(226,75,74,0.28);color:#f5a09f}

.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px}
.hub-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--rl);padding:15px;cursor:pointer;transition:border-color 0.12s,background 0.12s;text-align:left;width:100%}
.hub-card:hover{border-color:var(--blue);background:var(--blue-dim)}
.hcn{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.hcs{font-size:11px;color:var(--hint)}

.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.metric{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px}
.ml{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.mv{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.ms{font-size:11px;color:var(--hint);margin-top:3px}

.threshold-bar{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tbar-label{font-size:12px;color:var(--muted);white-space:nowrap}
.tbar-btns{display:flex;gap:5px}
.tbar-btn{height:24px;padding:0 9px;border-radius:var(--r);font-size:11px;font-weight:500;font-family:inherit;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--muted);transition:all 0.12s}
.tbar-btn:hover{background:var(--surface2);color:var(--text)}
.tbar-btn.sel{background:var(--amber-dim);border-color:rgba(239,159,39,0.4);color:var(--amber)}
.tbar-desc{font-size:11px;color:var(--hint);margin-left:auto}

.scan-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.pt{font-size:13px;font-weight:500}
.pp{font-size:13px;font-weight:600;color:var(--blue-light)}
.ptrack{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:9px}
.pfill{height:100%;background:var(--blue);border-radius:2px;transition:width 0.35s ease}
.pmsg{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.pstats{font-size:11px;color:var(--hint);margin-top:5px}
.spinner{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.tc{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.thead-row{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px}
.ttitle{font-size:13px;font-weight:600}
.cbadge{background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--muted)}
.tcontrols{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sw{position:relative}
.sw svg{position:absolute;left:7px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--hint);pointer-events:none}
.sinput{height:26px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);padding:0 9px 0 24px;font-size:12px;font-family:inherit;outline:none;width:170px}
.sinput:focus{border-color:var(--blue)}
.fsel{height:26px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);padding:0 8px;font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.fsel option{background:#1a1a1a}

table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:0.08em;background:var(--surface2);border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--muted)}
tbody tr{border-bottom:0.5px solid var(--border);transition:background 0.08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 14px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* version badges */
.vb{display:inline-flex;align-items:center;justify-content:center;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.v-ok  {background:var(--green-dim);color:#4ecba3;border:0.5px solid rgba(29,158,117,0.28)}
.v-1   {background:var(--blue-dim);color:#7ab4f5;border:0.5px solid rgba(20,115,230,0.28)}
.v-2   {background:var(--amber-dim);color:#f5c96a;border:0.5px solid rgba(239,159,39,0.28)}
.v-old {background:var(--red-dim);color:#f5a09f;border:0.5px solid rgba(226,75,74,0.28)}
.v-risk{background:rgba(226,75,74,0.2);color:#f5a09f;border:1px solid rgba(226,75,74,0.45)}
.v-none{background:var(--surface2);color:var(--hint);border:0.5px solid var(--border)}

/* status chips */
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:0.04em}
.chip-ok  {background:var(--green-dim);color:#4ecba3}
.chip-warn{background:var(--amber-dim);color:#f5c96a}
.chip-crit{background:var(--red-dim);color:#f5a09f}
.chip-none{background:var(--surface2);color:var(--hint)}
.chip-scan{background:var(--surface2);color:var(--hint)}

/* model type pills */
.type-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;white-space:nowrap}
.tp-c4r  {background:var(--purple-dim);color:#a89fea;border:0.5px solid rgba(127,119,221,0.3)}
.tp-cloud{background:var(--surface2);color:var(--hint);border:0.5px solid var(--border)}

tr.risk-row{background:rgba(226,75,74,0.04)}
tr.risk-row:hover{background:rgba(226,75,74,0.08)}

/* expand */
.xbtn{background:transparent;border:none;cursor:pointer;color:var(--hint);padding:0;display:flex;align-items:center;transition:color 0.12s}
.xbtn:hover{color:var(--text)}
.xbtn svg{width:12px;height:12px;transition:transform 0.18s}
.xbtn.open svg{transform:rotate(90deg)}
.xrow td{padding:0;border-bottom:0.5px solid var(--border)}
.xinner{padding:10px 14px 14px 44px;background:var(--surface3)}

/* section headers inside expand */
.xsec-head{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px 4px;color:var(--hint)}
.xmini{width:100%;border-collapse:collapse;font-size:12px}
.xmini td{padding:5px 10px;border-bottom:0.5px solid var(--border);color:var(--muted)}
.xmini tr:last-child td{border-bottom:none}
.xmini td:first-child{color:var(--text)}
.xmini tr.xrisk td{color:#f5a09f}
.xmini tr.xrisk td:first-child{color:#f5a09f}
.xmini tr.xcloud td{color:var(--hint);font-style:italic}

.acc-link{display:inline-flex;align-items:center;gap:3px;color:var(--blue-light);font-size:11px;text-decoration:none;opacity:0.65;transition:opacity 0.12s}
.acc-link:hover{opacity:1}
.acc-link svg{width:10px;height:10px}

.depr{background:rgba(239,159,39,0.07);border:0.5px solid rgba(239,159,39,0.22);border-radius:var(--rl);padding:13px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:11px}
.depr svg{width:15px;height:15px;color:var(--amber);flex-shrink:0;margin-top:1px}
.dt{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:2px}
.db{font-size:12px;color:#c9a44a;line-height:1.6}

.empty{padding:50px 20px;text-align:center}
.et{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:4px}
.es{font-size:12px;color:var(--hint)}
.pname{font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.psub{font-size:11px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* legend */
.legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 16px;border-top:0.5px solid var(--border);background:var(--surface2)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--hint)}

/* CSS tooltips on type pills — handled by JS global tooltip */
.type-pill{position:relative;cursor:default}

/* th tooltip wrapper */
.th-tip{position:relative;display:inline-flex;align-items:center;gap:4px}
.th-tip{cursor:default}
thead th{overflow:visible}
thead{overflow:visible}

@media(max-width:820px){.sidebar{display:none}.metrics{grid-template-columns:1fr 1fr 1fr}}
@media(max-width:900px){.setup-grid{grid-template-columns:1fr !important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tl">
    <div class="logo"><svg viewBox="0 0 16 16" fill="white"><path d="M2 12.5L5.8 3h2.1L11.5 12.5H9.3l-.9-2.5H5.6l-.9 2.5H2zm4.5-7.5L5.2 8.8h2.6L6.5 5z"/></svg></div>
    <span class="app-name">Revit Version Checker</span>
    <span class="app-sub">Autodesk Forma / ACC</span>
  </div>
  <div id="tr"></div>
</div>

<div class="shell">
  <nav class="sidebar" id="sidebar">
    <div class="ss">
      <div class="slabel">Navigate</div>
      <button class="ni active" id="nav-scan" onclick="navTo('scan')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.5h14v1.2H1zm0 3.9h14v1.2H1zm0 3.9h9v1.2H1z"/></svg>
        Hub dashboard
      </button>
      <button class="ni" id="nav-about" onclick="navTo('about')">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6.2" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 7v5M8 5.2v.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        About
      </button>
    </div>
    <div class="ndiv"></div>
    <div class="ss" id="sctx"></div>
    <div style="flex:1"></div>
    <div class="ss" style="margin-bottom:0">
      <a class="ni" href="https://github.com/tsb2127/revit-version-checker" target="_blank">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 .5a7.5 7.5 0 00-2.37 14.62c.37.07.51-.16.51-.36 0-.18-.01-.65-.01-1.28-2.08.45-2.52-1-2.52-1-.34-.86-.83-1.09-.83-1.09-.68-.46.05-.45.05-.45.75.05 1.15.77 1.15.77.67 1.14 1.75.81 2.18.62.07-.48.26-.81.47-1-1.66-.19-3.41-.83-3.41-3.7 0-.82.29-1.49.77-2.01-.08-.19-.33-.95.07-1.98 0 0 .63-.2 2.06.77A7.17 7.17 0 018 4.42a7.17 7.17 0 011.88.25c1.43-.97 2.06-.77 2.06-.77.4 1.03.15 1.79.07 1.98.48.52.77 1.19.77 2.01 0 2.88-1.75 3.51-3.42 3.7.27.23.51.69.51 1.39 0 1-.01 1.81-.01 2.06 0 .2.14.43.52.36A7.5 7.5 0 008 .5z"/></svg>
        GitHub
      </a>
      <a class="ni" href="https://aps.autodesk.com" target="_blank">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5l6.5 12h-13L8 1.5zm0 3.5L4 12h8L8 5z"/></svg>
        APS docs
      </a>
    </div>
  </nav>
  <main class="content" id="mc"></main>
</div>

<script>
const APS = 'https://developer.api.autodesk.com';

// ─── PKCE OAuth config ────────────────────────────────────────────────────────
// No hardcoded client ID — each user supplies their own APS app credentials.
// This means the app works for any ACC hub without needing a central whitelist.
const OAUTH = {
  redirectUri: window.location.origin + window.location.pathname.replace(/\/$/,''),
  authUrl:     'https://developer.api.autodesk.com/authentication/v2/authorize',
  tokenUrl:    'https://developer.api.autodesk.com/authentication/v2/token',
  scope:       'data:read'
};

// PKCE helpers
async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return hash;
}
function base64urlencode(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function randomString(len=64) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return base64urlencode(arr);
}
async function startPKCE(clientId) {
  if (!clientId) throw new Error('Please enter your APS Client ID first.');
  const verifier  = randomString(64);
  const challenge = base64urlencode(await sha256(verifier));
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('pkce_client_id', clientId);
  const url = OAUTH.authUrl
    + '?response_type=code'
    + '&client_id='       + encodeURIComponent(clientId)
    + '&redirect_uri='    + encodeURIComponent(OAUTH.redirectUri)
    + '&scope='           + encodeURIComponent(OAUTH.scope)
    + '&code_challenge='  + challenge
    + '&code_challenge_method=S256'
    + '&nonce='           + randomString(16);
  window.location.href = url;
}
async function handleCallback(code) {
  const verifier  = sessionStorage.getItem('pkce_verifier');
  const clientId  = sessionStorage.getItem('pkce_client_id');
  if (!verifier || !clientId) throw new Error('Session expired — please try signing in again.');
  sessionStorage.removeItem('pkce_verifier');
  sessionStorage.removeItem('pkce_client_id');
  const r = await fetch(OAUTH.tokenUrl, {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      grant_type:    'authorization_code',
      client_id:     clientId,
      redirect_uri:  OAUTH.redirectUri,
      code,
      code_verifier: verifier
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.errorMessage || e.error_description || r.status+' '+r.statusText);
  }
  const d = await r.json();
  return { token: d.access_token, clientId };
}
async function fetchUserName(token) {
  try {
    const r = await fetch('https://developer.api.autodesk.com/userprofile/v1/users/@me',
      {headers:{Authorization:'Bearer '+token}});
    if (!r.ok) return '';
    const d = await r.json();
    return (d.firstName||'') + (d.lastName ? ' '+d.lastName : '');
  } catch(e) { return ''; }
}

// Extension types that indicate a Revit Cloud Workshared (C4R) model
const C4R_TYPES = [
  'versions:autodesk.bim360:C4RModel',
  'versions:autodesk.a360:C4RModel',
  'versions:autodesk.core:C4RModel'
];

const S = {
  phase:'setup',
  token:localStorage.getItem('rvt_tok')||'',
  uname:localStorage.getItem('rvt_uname')||'',
  clientId:localStorage.getItem('rvt_client_id')||'',
  hubs:[],hub:null,
  projects:[],
  scanning:false,aborted:false,
  pct:0,msg:'',pdone:0,ptotal:0,
  expanded:new Set(),
  search:'',statusFilter:['all'],
  sortCol:'risk',sortDir:-1,
  threshold:parseInt(localStorage.getItem('rvt_thresh')||'2021'),
  error:null
};

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fDate = iso => iso ? new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
const isAtRisk = v => v && parseInt(v) <= S.threshold;

async function api(path) {
  const r = await fetch(APS + path, {headers:{Authorization:'Bearer '+S.token}});
  if (!r.ok) throw new Error(r.status+' '+r.statusText);
  return r.json();
}

function vClass(v, gl) {
  if (!v) return 'v-none';
  const n=parseInt(v), l=parseInt(gl||v);
  if (n>=l)    return 'v-ok';
  if (n===l-1) return 'v-1';
  if (n===l-2) return 'v-2';
  return 'v-old';
}

function hubLatest() {
  return S.projects.reduce((mx,p) => {
    if (!p.c4rVersion) return mx;
    return parseInt(p.c4rVersion) > parseInt(mx||'0') ? p.c4rVersion : mx;
  }, null);
}

function pStatus(p) {
  if (p.scanning)    return 'scanning';
  if (!p.c4rVersion) return 'no-c4r';
  if (isAtRisk(p.c4rVersion)) return 'critical';
  const gl = hubLatest();
  if (gl && parseInt(p.c4rVersion) < parseInt(gl)-1) return 'warn';
  return 'ok';
}

// ─── SCAN FOLDER ─────────────────────────────────────────────────────────────
async function scanFolder(projectId, folderId, pathLabel, c4rFiles, cloudFiles) {
  if (S.aborted) return;
  let items;
  try {
    const d = await api('/data/v1/projects/'+projectId+'/folders/'+folderId+'/contents');
    items = d.data || [];
  } catch(e) { return; }

  const folders = items.filter(i => i.type==='folders');
  const rvts    = items.filter(i =>
    i.type==='items' &&
    i.attributes?.displayName?.toLowerCase().endsWith('.rvt')
  );

  for (const item of rvts) {
    if (S.aborted) return;
    S.msg = item.attributes.displayName;
    render();

    let version = null, isC4R = false, modTime = null, modBy = null;

    try {
      const vd = await api('/data/v1/projects/'+projectId+'/items/'+encodeURIComponent(item.id)+'/versions');
      const latest = (vd.data||[])[0];
      if (latest) {
        const extType = latest.attributes?.extension?.type || '';
        // Check if this is a C4R (cloud workshared) model
        isC4R = C4R_TYPES.some(t => extType.toLowerCase().includes('c4r'));
        // C4R version comes directly from revitProjectVersion
        const rv = latest.attributes?.extension?.data?.revitProjectVersion;
        if (rv) version = String(rv);
        modTime = latest.attributes?.lastModifiedTime;
        modBy   = latest.attributes?.lastModifiedUserName;
      }
    } catch(e) {}

    const fileObj = {
      id: item.id,
      name: item.attributes.displayName,
      path: pathLabel,
      version,
      isC4R,
      modTime,
      modBy
    };

    if (isC4R) {
      c4rFiles.push(fileObj);
    } else {
      cloudFiles.push(fileObj);
    }
  }

  for (const f of folders) {
    if (S.aborted) return;
    const fname = f.attributes.displayName || f.attributes.name || '';
    await scanFolder(projectId, f.id, pathLabel+' / '+fname, c4rFiles, cloudFiles);
  }
}

function deriveProject(p) {
  const c4r = p.c4rFiles || [];
  const cloud = p.cloudFiles || [];
  // C4R version: if all C4R files agree on one version, that's the project version.
  // If somehow multiple versions exist (rare edge case after partial upgrades),
  // surface them all so the user can see the discrepancy — don't hide it.
  const c4rVersions = [...new Set(c4r.map(f=>f.version).filter(Boolean))];
  p.c4rVersion = c4rVersions.length === 1 ? c4rVersions[0] : (c4rVersions.length > 1 ? 'MIXED' : null);
  p.c4rVersions = c4rVersions; // all unique versions found in C4R files
  p.c4rCount  = c4r.length;
  p.cloudCount = cloud.length;
  p.atRisk = c4r.filter(f => isAtRisk(f.version)).length;
  const mods = [...c4r,...cloud].map(f=>f.modTime).filter(Boolean).sort();
  p.lastMod = mods[mods.length-1] || null;
  return p;
}

// ─── HUB SCAN ────────────────────────────────────────────────────────────────
async function scanHub(hub) {
  S.hub=hub; S.projects=[]; S.scanning=true; S.aborted=false;
  S.pct=0; S.pdone=0; S.error=null; S.phase='dash';
  render();

  let raw=[];
  try {
    const d = await api('/project/v1/hubs/'+hub.id+'/projects');
    raw = d.data||[];
  } catch(e) { S.error='Could not load projects: '+e.message; S.scanning=false; render(); return; }

  S.ptotal=raw.length;
  S.projects=raw.map(p=>({
    id:p.id, name:p.attributes.name||p.id,
    accUrl:makeAccUrl(hub.id,p.id),
    scanning:true, c4rFiles:[], cloudFiles:[],
    c4rVersion:null, c4rVersions:[], c4rCount:0, cloudCount:0,
    atRisk:0, lastMod:null
  }));
  render();

  for (let i=0; i<S.projects.length; i++) {
    if (S.aborted) break;
    const proj = S.projects[i];
    S.msg = proj.name;
    render();
    try {
      const td = await api('/project/v1/hubs/'+hub.id+'/projects/'+proj.id+'/topFolders');
      const c4rFiles=[], cloudFiles=[];
      for (const f of (td.data||[])) {
        if (S.aborted) break;
        await scanFolder(proj.id, f.id, f.attributes.displayName||'Files', c4rFiles, cloudFiles);
      }
      proj.c4rFiles   = c4rFiles;
      proj.cloudFiles = cloudFiles;
    } catch(e) { proj.c4rFiles=[]; proj.cloudFiles=[]; }
    deriveProject(proj);
    proj.scanning=false;
    S.pdone=i+1;
    S.pct=Math.round(((i+1)/S.projects.length)*100);
    render();
  }
  S.scanning=false;
  render();
}

function makeAccUrl(hubId, projectId) {
  const pid = projectId.replace(/^b\./,'');
  return `https://acc.autodesk.com/docs/files/projects/${pid}`;
}

async function loadHubs() {
  S.error=null;
  try {
    const d = await api('/project/v1/hubs');
    S.hubs = d.data||[];
    if (S.hubs.length===1) { scanHub({id:S.hubs[0].id,name:S.hubs[0].attributes.name}); return; }
    S.phase='hubs'; render();
  } catch(e) { S.error='Connection failed — check your token. '+e.message; render(); }
}

        <div style="font-size:11px;color:rgba(245,160,159,0.75);line-height:1.75">This is an open-source tool built by an individual Autodesk employee, not an official Autodesk product. It has not undergone a security audit or Autodesk's internal app review process. Scope is <code style="background:rgba(0,0,0,0.2);padding:1px 3px;border-radius:3px">data:read</code> only. Source code is public at <a href="https://github.com/tsb2127/revit-version-checker" target="_blank" style="color:inherit;text-decoration:underline">GitHub</a> for your IT team to review. By signing in you accept these terms.</div>
      </div>
    </div>

  </div>`;
}

function rHubs() {

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:15px;font-weight:600">Select a hub to scan</h2>
      <button class="btn btn-g btn-sm" onclick="S.phase='setup';render()">Change token</button>
    </div>
    <div class="hub-grid">
      ${S.hubs.map(h=>`<button class="hub-card" onclick="scanHub({id:'${h.id}',name:'${esc(h.attributes.name)}'})">
        <div class="hcn">${esc(h.attributes.name||h.id)}</div>
        <div class="hcs">${h.attributes.region||'ACC Hub'} — click to scan all projects</div>
      </button>`).join('')}

}

function rDash() {
  const gl = hubLatest();
  const totalC4R    = S.projects.reduce((s,p)=>s+p.c4rCount,0);
  const totalCloud  = S.projects.reduce((s,p)=>s+p.cloudCount,0);
  const atRiskFiles = S.projects.reduce((s,p)=>s+p.atRisk,0);
  const critProj    = S.projects.filter(p=>pStatus(p)==='critical').length;
  const noC4R       = S.projects.filter(p=>pStatus(p)==='no-c4r').length;

  let rows = [...S.projects];
  if (S.search) { const q=S.search.toLowerCase(); rows=rows.filter(p=>p.name.toLowerCase().includes(q)); }
  const activeStatuses = Array.isArray(S.statusFilter) ? S.statusFilter : [S.statusFilter];
  if (!activeStatuses.includes('all')) rows=rows.filter(p=>activeStatuses.includes(pStatus(p)));
  rows.sort((a,b)=>{
    let av,bv;
    if      (S.sortCol==='name')  { av=a.name; bv=b.name; }
    else if (S.sortCol==='ver')   { av=parseInt(a.c4rVersion||'0'); bv=parseInt(b.c4rVersion||'0'); }
    else if (S.sortCol==='c4r')   { av=a.c4rCount; bv=b.c4rCount; }
    else if (S.sortCol==='risk')  { av=a.atRisk; bv=b.atRisk; }
    else if (S.sortCol==='mod')   { av=a.lastMod||''; bv=b.lastMod||''; }
    return av<bv?-S.sortDir:av>bv?S.sortDir:0;
  });

  const th=(col,lbl,w)=>`<th style="width:${w}" onclick="sortBy('${col}')">${lbl}${S.sortCol===col?(S.sortDir===1?' ↑':' ↓'):''}</th>`;

  return `
    ${atRiskFiles>0?`<div class="depr">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 2.5L14 13.5H2L8 2.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8 6.5v3.5M8 11.5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <div>
        <div class="dt">Deprecation risk — action required</div>
        <div class="db"><strong>${atRiskFiles} workshared model${atRiskFiles!==1?'s':''}</strong> across <strong>${critProj} project${critProj!==1?'s':''}</strong> are on Revit ${S.threshold} or older. Autodesk is ending cloud worksharing access for these versions (FY27 Q3/Q4). Use <strong>Revit Cloud Model Upgrade</strong> in ACC to upgrade before the deadline. Revit Cloud Models (non-workshared) are not affected.</div>
      </div>
    </div>`:''}

    <div class="metrics">
      <div class="metric"><div class="ml">Projects</div><div class="mv">${S.projects.length}</div><div class="ms">${S.scanning?'scanning…':'in hub'}</div></div>
      <div class="metric"><div class="ml">Hub version</div><div class="mv">${gl||'—'}</div><div class="ms">latest workshared</div></div>
      <div class="metric"><div class="ml">Cloud Workshared</div><div class="mv">${totalC4R}</div><div class="ms">RCW models</div></div>
      <div class="metric"><div class="ml">At risk ≤${S.threshold}</div><div class="mv" style="color:${atRiskFiles>0?'var(--red)':'var(--green)'}">${atRiskFiles}</div><div class="ms">${critProj} projects</div></div>
      <div class="metric"><div class="ml">Cloud Models</div><div class="mv" style="color:var(--hint)">${totalCloud}</div><div class="ms">non-workshared</div></div>
    </div>

    <div class="threshold-bar">
      <span class="tbar-label">Flag workshared models at or below:</span>
      <div class="tbar-btns">
        ${[2022,2021,2020,2019].map(y=>`<button class="tbar-btn${S.threshold===y?' sel':''}" onclick="setThresh(${y})">${y}</button>`).join('')}
      </div>
      <span class="tbar-desc">Only workshared models are counted toward risk</span>
    </div>

    ${S.scanning?`<div class="scan-box">
      <div class="ph"><span class="pt">Scanning all projects — identifying Revit Cloud Workshared vs Cloud Models</span><span class="pp">${S.pct}%</span></div>
      <div class="ptrack"><div class="pfill" style="width:${S.pct}%"></div></div>
      <div class="pmsg"><span class="spinner"></span>${esc(S.msg)}</div>
      <div class="pstats">${S.pdone} of ${S.ptotal} projects done</div>
      <div style="margin-top:9px"><button class="btn btn-g btn-sm" onclick="S.aborted=true;S.scanning=false;render()">Stop scan</button></div>
    </div>`:''}

    <div class="tc">
      <div class="thead-row">
        <div style="display:flex;align-items:center;gap:9px">
          <span class="ttitle">${esc(S.hub.name)}</span>
          <span class="cbadge">${rows.length} of ${S.projects.length} projects</span>
        </div>
        <div class="tcontrols">
          <div class="sw">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.7 10.3a6.5 6.5 0 10-1.4 1.4l3.85 3.85a1 1 0 001.4-1.4l-3.85-3.85zM6.5 11a4.5 4.5 0 110-9 4.5 4.5 0 010 9z"/></svg>
            <input class="sinput" placeholder="Search projects…" value="${esc(S.search)}" oninput="S.search=this.value;render()"/>
          </div>
          <select class="fsel" multiple size="1" title="Ctrl/Cmd+click to select multiple statuses" onchange="S.statusFilter=[...this.selectedOptions].map(o=>o.value);if(!S.statusFilter.length)S.statusFilter=['all'];if(S.statusFilter.includes('all')&&S.statusFilter.length>1)S.statusFilter=S.statusFilter.filter(v=>v!=='all');render()">
            <option value="all" ${S.statusFilter.includes('all')?'selected':''}>All statuses</option>
            <option value="critical" ${S.statusFilter.includes('critical')?'selected':''}>Critical (at risk)</option>
            <option value="warn"     ${S.statusFilter.includes('warn')?'selected':''}>Outdated</option>
            <option value="ok"       ${S.statusFilter.includes('ok')?'selected':''}>Current</option>
            <option value="no-c4r"   ${S.statusFilter.includes('no-c4r')?'selected':''}>No workshared files</option>
          </select>
          <button class="btn btn-g btn-sm" onclick="exportCsv()">Export CSV</button>
          <button class="btn btn-g btn-sm" onclick="exportPdf()">Export PDF</button>
          <button class="btn btn-g btn-sm" onclick="S.phase='hubs';render()">Change hub</button>
        </div>
      </div>

      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th style="width:28px"></th>
          ${th('name','Project','31%')}
          ${th('ver','<span class="th-tip" data-tip="Revit Cloud Workshared version">RCW version</span>','11%')}
          ${th('c4r','<span class="th-tip" data-tip="Revit Cloud Workshared files">RCW files</span>','8%')}
          ${th('risk','At risk','8%')}
          <th style="width:9%"><span class="th-tip" data-tip="Revit Cloud Model — no version lock">RC files</span></th>
          <th style="width:11%">Status</th>
          ${th('mod','Last modified','14%')}
          <th style="width:5%">ACC</th>
        </tr></thead>
        <tbody>
          ${rows.length===0?`<tr><td colspan="9"><div class="empty"><div class="et">No projects match</div></div></td></tr>`:''}
          ${rows.map(p=>rRow(p,gl)).join('')}
        </tbody>
      </table></div>

      <div class="legend">
        <span style="font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:0.08em;margin-right:4px">Legend:</span>
        <span class="legend-item"><span class="type-pill tp-c4r" data-tip="Revit Cloud Workshared">RCW</span> Version is locked — counted toward deprecation risk</span>
        <span class="legend-item"><span class="type-pill tp-cloud" data-tip="Revit Cloud Model">RC</span> No version lock — excluded from risk</span>
      </div>
    </div>`;
}

function rRow(p, gl) {
  const status  = pStatus(p);
  const isExp   = S.expanded.has(p.id);
  const isRisk  = status === 'critical';
  const isMixed = p.c4rVersion === 'MIXED';

  // version display — handle mixed edge case
  const verHtml = isMixed
    ? `<span class="vb v-old" title="Multiple C4R versions found: ${esc(p.c4rVersions.join(', '))}">MIXED</span>`
    : p.c4rVersion
      ? `<span class="vb ${isAtRisk(p.c4rVersion)?'v-risk':vClass(p.c4rVersion,gl)}">${p.c4rVersion}</span>`
      : `<span style="font-size:12px;color:var(--hint)">—</span>`;

  const chipMap = {
    critical:`<span class="chip chip-crit">Critical</span>`,
    warn:    `<span class="chip chip-warn">Outdated</span>`,
    ok:      `<span class="chip chip-ok">Current</span>`,
    'no-c4r':`<span class="chip chip-none">No RCW</span>`,
    scanning:`<span class="chip chip-scan"><span class="spinner" style="width:9px;height:9px;margin-right:3px"></span>Scanning</span>`
  };

  const hasFiles = p.c4rCount > 0 || p.cloudCount > 0;

  let html = `<tr class="${isRisk?'risk-row':''}">
    <td style="padding-left:10px">${hasFiles?`<button class="xbtn${isExp?' open':''}" onclick="toggleX('${p.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg></button>`:''}</td>
    <td>
      <div class="pname" title="${esc(p.name)}">${esc(p.name)}</div>
      ${isMixed?`<div class="psub" style="color:var(--amber)">Multiple workshared versions — check files</div>`:''}
    </td>
    <td>${verHtml}</td>
    <td style="color:var(--muted)">${p.c4rCount||'—'}</td>
    <td style="color:${p.atRisk>0?'var(--red)':'var(--hint)'};font-weight:${p.atRisk>0?'600':'400'}">${p.atRisk||'—'}</td>
    <td style="color:var(--hint)">${p.cloudCount||'—'}</td>
    <td>${chipMap[status]||''}</td>
    <td style="font-size:11px;color:var(--hint)">${fDate(p.lastMod)}</td>
    <td>${p.accUrl?`<a class="acc-link" href="${esc(p.accUrl)}" target="_blank" title="Open in ACC"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M10 2h4v4M14 2L8 8M3 4h3v1H4v7h7v-3h1v4H3V4z"/></svg></a>`:''}</td>
  </tr>`;

  if (isExp) {
    html += `<tr class="xrow"><td colspan="9"><div class="xinner">`;

    // C4R section
    if (p.c4rFiles && p.c4rFiles.length > 0) {
      html += `<div class="xsec-head"><span class="type-pill tp-c4r" data-tip="Revit Cloud Workshared" style="margin-right:6px">RCW</span> Revit Cloud Workshared — version is locked, counts toward deprecation risk</div>
        <table class="xmini"><thead><tr>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase;padding-bottom:4px;width:28%">File</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:10%">Version</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:30%">Path</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase">Modified</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase">By</td>
        </tr></thead><tbody>
        ${p.c4rFiles.map(f=>`<tr class="${isAtRisk(f.version)?'xrisk':''}">
          <td>${esc(f.name)}</td>
          <td><span class="vb ${isAtRisk(f.version)?'v-risk':vClass(f.version,gl)}" style="font-size:10px;padding:1px 7px">${f.version||'—'}</span></td>
          <td style="font-size:11px" title="${esc(f.path||'')}">${esc(f.path||'—')}</td>
          <td>${fDate(f.modTime)}</td>
          <td>${esc(f.modBy||'—')}</td>
        </tr>`).join('')}
        </tbody></table>`;
    }

    // Cloud storage section
    if (p.cloudFiles && p.cloudFiles.length > 0) {
      html += `<div class="xsec-head" style="margin-top:10px"><span class="type-pill tp-cloud" data-tip="Revit Cloud Model" style="margin-right:6px">RC</span> Revit Cloud Model — uploaded without worksharing, no version lock, not counted toward risk</div>
        <table class="xmini"><thead><tr>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase;padding-bottom:4px;width:28%">File</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:10%">Version</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:30%">Path</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase">Modified</td>
          <td style="color:var(--hint);font-size:10px;text-transform:uppercase">By</td>
        </tr></thead><tbody>
        ${p.cloudFiles.map(f=>`<tr class="xcloud">
          <td>${esc(f.name)}</td>
          <td><span class="vb v-none" style="font-size:10px;padding:1px 7px">${f.version||'—'}</span></td>
          <td style="font-size:11px" title="${esc(f.path||'')}">${esc(f.path||'—')}</td>
          <td>${fDate(f.modTime)}</td>
          <td>${esc(f.modBy||'—')}</td>
        </tr>`).join('')}
        </tbody></table>`;
    }

    html += `</div></td></tr>`;
  }

  return html;
}

function rAbout() {
  return `<div style="max-width:540px">
    <h2 style="font-size:17px;font-weight:600;margin-bottom:18px">About</h2>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Revit Cloud Workshared vs Revit Cloud Model — why it matters</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:10px">Not all RVT files in ACC are the same. The app distinguishes two types:</p>
      <div style="display:flex;flex-direction:column;gap:10px;font-size:13px;margin-bottom:10px">
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span class="type-pill tp-c4r" data-tip="Revit Cloud Workshared" style="flex-shrink:0;margin-top:2px">RCW</span>
          <span style="color:var(--muted)">Cloud Worksharing is enabled. The entire team is locked to one Revit version. These are the files affected by Autodesk's deprecation timeline. Detected via <code style="font-size:11px;background:var(--surface2);padding:1px 4px;border-radius:3px">extension.type</code> containing <code style="font-size:11px;background:var(--surface2);padding:1px 4px;border-radius:3px">C4RModel</code>.</span>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span class="type-pill tp-cloud" data-tip="Revit Cloud Model" style="flex-shrink:0;margin-top:2px">RC</span>
          <span style="color:var(--muted)">A Revit file uploaded to ACC without worksharing. No version lock — anyone can open it in any version. Not affected by the deprecation deadline. Excluded from all risk counts.</span>
        </div>
      </div>
      <p style="font-size:12px;color:var(--hint);line-height:1.7">If a project shows "MIXED" versions, multiple workshared files in that project were initiated on different Revit versions. This is unusual and may indicate a partial upgrade — expand the row to see which files are affected.</p>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Built by</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.8">Tanmay Bhalerao — Senior Account Technical Lead at Autodesk. Built this because customers kept asking for it and it didn't exist. Not a software engineer by background — proof that the APS APIs are approachable for anyone willing to experiment.</p>
    </div>
  </div>`;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  document.getElementById('tr').innerHTML = S.uname
    ? `<div style="display:flex;align-items:center;gap:8px">
        <div class="user-chip"><div class="ava">${S.uname.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}</div><span class="uname">${esc(S.uname)}</span></div>
        <button id="b-signout" class="btn btn-g btn-sm" style="font-size:11px">Sign out</button>
       </div>`
    : '';

  const sc = document.getElementById('sctx');
  if (S.hub) {
    const tot = S.projects.reduce((s,p)=>s+p.c4rCount,0);
    sc.innerHTML = `<div class="slabel">Hub</div><div style="padding:5px 9px;font-size:12px">
      <div style="font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${esc(S.hub.name)}</div>
      <div style="font-size:11px;color:var(--hint)">${S.projects.length} projects</div>
      ${tot>0?`<div style="font-size:11px;color:var(--green);margin-top:3px">${tot} workshared models found</div>`:''}
    </div>`;
  } else sc.innerHTML='';

  ['scan','about'].forEach(k=>{
    const el=document.getElementById('nav-'+k);
    if(el)el.className='ni'+((k==='scan'&&['setup','hubs','dash'].includes(S.phase))||(k===S.phase)?' active':'');
  });

  const mc=document.getElementById('mc');
  let html='';
  if(S.error)html+=`<div class="alert a-err"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 4h1.5v5h-1.5V5zm0 6h1.5v1.5h-1.5V11z"/></svg><span>${esc(S.error)} <button class="btn btn-g btn-sm" style="margin-left:8px" onclick="S.error=null;render()">Dismiss</button></span></div>`;

  if      (S.phase==='setup') html+=rSetup();
  else if (S.phase==='hubs')  html+=rHubs();
  else if (S.phase==='dash')  html+=rDash();
  else if (S.phase==='about') html+=rAbout();
  mc.innerHTML=html;
  bind();
}

function bind() {
  const bc=document.getElementById('bc');
  if(bc)bc.onclick=()=>{
    const cid = (document.getElementById('cid')?.value||'').trim();
    if(!cid){S.error='Please enter your APS Client ID first.';render();return;}
    S.clientId=cid;
    localStorage.setItem('rvt_client_id',cid);
    startPKCE(cid);
  };
  const bd=document.getElementById('bd');if(bd)bd.onclick=demo;
  const thresh=document.getElementById('thresh');
  if(thresh)thresh.onchange=()=>{S.threshold=parseInt(thresh.value);localStorage.setItem('rvt_thresh',S.threshold);};
  const bso=document.getElementById('b-signout');
  if(bso)bso.onclick=()=>{
    localStorage.removeItem('rvt_tok');
    localStorage.removeItem('rvt_uname');
    S.token='';S.uname='';S.hub=null;S.projects=[];S.phase='setup';
    render();
  };
}

window.navTo    = k => { S.phase=k==='scan'?(S.hub?'dash':'setup'):k; S.error=null; render(); };
window.sortBy   = col => { S.sortCol===col?S.sortDir*=-1:(S.sortCol=col,S.sortDir=1); render(); };
window.toggleX  = id => { S.expanded.has(id)?S.expanded.delete(id):S.expanded.add(id); render(); };
window.scanHub  = scanHub;
window.setThresh= v => { S.threshold=v; localStorage.setItem('rvt_thresh',v); render(); };

window.exportCsv = () => {
  const gl=hubLatest();
  const rows=[['Project','C4R Version','C4R Files','At Risk (C4R ≤'+S.threshold+')','Cloud Files','Status','Last Modified','ACC URL']];
  S.projects.forEach(p=>rows.push([p.name,p.c4rVersion||'',p.c4rCount,p.atRisk,p.cloudCount,pStatus(p),fDate(p.lastMod),p.accUrl||'']));
  rows.push([],[' --- C4R File Detail ---'],['Project','File','Version','At Risk','Path','Modified','By']);
  S.projects.forEach(p=>(p.c4rFiles||[]).forEach(f=>rows.push([p.name,f.name,f.version||'',isAtRisk(f.version)?'YES':'no',f.path||'',f.modTime||'',f.modBy||''])));
  rows.push([],[' --- Cloud Storage Files (not counted toward risk) ---'],['Project','File','Version','Path','Modified','By']);
  S.projects.forEach(p=>(p.cloudFiles||[]).forEach(f=>rows.push([p.name,f.name,f.version||'',f.path||'',f.modTime||'',f.modBy||''])));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='revit-hub-scan-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
};

window.exportPdf = () => {
  const rows = [...S.projects];
  const filtered = rows.filter(p => {
    if (S.search && !p.name.toLowerCase().includes(S.search.toLowerCase())) return false;
    const activeStatuses = Array.isArray(S.statusFilter) ? S.statusFilter : [S.statusFilter];
    if (!activeStatuses.includes('all') && !activeStatuses.includes(pStatus(p))) return false;
    return true;
  });
  const printedOn = new Date().toLocaleString();
  const html = `
  <html><head><title>Revit Hub Scan Report</title>
  <style>
    body{font-family:Arial,sans-serif;padding:24px;color:#111} h1{margin:0 0 8px} .meta{color:#555;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;font-size:12px} th,td{border:1px solid #ccc;padding:6px;text-align:left}
    th{background:#f3f3f3} .section{margin-top:22px}
  </style></head><body>
    <h1>Revit Version Checker Report</h1>
    <div class="meta">Generated: ${esc(printedOn)} | Threshold: ${S.threshold} | Filter: ${(Array.isArray(S.statusFilter)?S.statusFilter:[S.statusFilter]).join(', ')}</div>
    <table><thead><tr><th>Project</th><th>C4R Version</th><th>C4R Files</th><th>At Risk</th><th>Cloud Files</th><th>Status</th><th>Last Modified</th></tr></thead>
    <tbody>
      ${filtered.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.c4rVersion||'—')}</td><td>${p.c4rCount||0}</td><td>${p.atRisk||0}</td><td>${p.cloudCount||0}</td><td>${esc(pStatus(p))}</td><td>${fDate(p.lastMod)}</td></tr>`).join('')}
    </tbody></table>
    <div class="section"><h3>Critical project details</h3>
      ${filtered.filter(p=>pStatus(p)==='critical').map(p=>`<p><strong>${esc(p.name)}</strong>: ${p.atRisk||0} at-risk RCW model(s)</p>`).join('') || '<p>None</p>'}
    </div>
  </body></html>`;
  const w = window.open('', '_blank');
  if(!w) return alert('Pop-up blocked. Please allow pop-ups to export PDF.');
  w.document.write(html);
  w.document.close();
  w.focus();
  w.print();
};

// ─── OAUTH CALLBACK HANDLER ───────────────────────────────────────────────────
(async function initAuth() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');

  if (error) {
    S.error = 'Sign-in was cancelled or failed: ' + (params.get('error_description') || error);
    window.history.replaceState({}, '', window.location.pathname);
    render();
    return;
  }

  if (code) {
    window.history.replaceState({}, '', window.location.pathname);
    S.phase = 'setup';
    const mc = document.getElementById('mc');
    if (mc) mc.innerHTML = `<div style="display:flex;align-items:center;gap:10px;padding:40px 0;color:var(--muted);font-size:13px"><span class="spinner"></span> Completing sign-in…</div>`;
    try {
      const { token, clientId } = await handleCallback(code);
      const name  = await fetchUserName(token);
      S.token    = token;
      S.clientId = clientId;
      S.uname    = name || 'Autodesk User';
      localStorage.setItem('rvt_tok',       token);
      localStorage.setItem('rvt_client_id', clientId);
      localStorage.setItem('rvt_uname',     S.uname);
      render();
      loadHubs();
    } catch(e) {
      S.error = 'Sign-in failed: ' + e.message;
      render();
    }
    return;
  }

  if (S.token && S.token !== 'demo') {
    render();
    loadHubs();
    return;
  }

  render();
})();

// ─── GLOBAL TOOLTIP ──────────────────────────────────────────────────────────
// Single fixed-position tooltip div that follows the mouse.
// Triggered by any element with a data-tip attribute.
// Escapes all z-index / overflow clipping issues.
(function(){
  const tip = document.createElement('div');
  tip.id = 'gtip';
  tip.style.cssText = 'position:fixed;z-index:99999;background:#1a1a1a;color:#f0f0f0;font-size:11px;font-family:inherit;padding:4px 9px;border-radius:5px;border:0.5px solid rgba(255,255,255,0.13);pointer-events:none;opacity:0;transition:opacity 0.1s;white-space:nowrap;max-width:260px;line-height:1.4';
  document.body.appendChild(tip);

  let current = null;

  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    current = el;
    tip.textContent = el.getAttribute('data-tip');
    tip.style.opacity = '1';
    position(e);
  });

  document.addEventListener('mousemove', e => {
    if (!current) return;
    position(e);
  });

  document.addEventListener('mouseout', e => {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    current = null;
    tip.style.opacity = '0';
  });

  function position(e) {
    const pad = 12;
    let x = e.clientX + pad;
    let y = e.clientY - 30;
    const w = tip.offsetWidth;
    const h = tip.offsetHeight;
    if (x + w > window.innerWidth - pad) x = e.clientX - w - pad;
    if (y < pad) y = e.clientY + pad;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }
})();
</script>
