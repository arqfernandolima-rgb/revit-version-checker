            {v:"no-version",label:"No Version (RCW, year unknown)",dot:"var(--amber)"},
          ];
          const sel=S.statusFilters;
          const btnLabel=sel.size===0?"All statuses":sel.size===1?opts.find(o=>sel.has(o.v))?.label||"1 selected":`${sel.size} statuses`;
          const panel=S.filterOpen?`<div class="filter-panel" id="filter-panel">
            ${opts.map(o=>`<div class="filter-opt" onclick="event.stopPropagation();toggleFilter('${o.v}')">
              <div class="filter-cb${sel.has(o.v)?" on":""}"><svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5l2.5 2.5L8 3"/></svg></div>
              <span style="width:7px;height:7px;border-radius:50%;background:${o.dot};flex-shrink:0;display:inline-block"></span>
              <span>${o.label}</span>
            </div>`).join("")}
            <div class="fdiv"></div>
            <div class="filter-clear" onclick="event.stopPropagation();clearFilters()">
              <span>Clear all filters</span>
              ${sel.size>0?`<span style="background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700">${sel.size}</span>`:""}
            </div>
          </div>`:"";
          return `<button class="filter-btn${S.filterOpen?" open":""}${sel.size>0?" active":""}" onclick="event.stopPropagation();S.filterOpen=!S.filterOpen;render()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
            ${esc(btnLabel)}
            <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 1l4 4 4-4"/></svg>
          </button>${panel}`;
        })()}
      </div>
      <button class="btn btn-g btn-sm" onclick="exportCsv()" title="Export all groups to CSV">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M3 11v2h10v-2M8 3v8M5 8l3 3 3-3"/></svg>All CSV
      </button>
      <button class="btn btn-g btn-sm" onclick="exportPdf()" ${S.scanning?"disabled":""} title="Export all groups to PDF">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 1h6l4 4v10H4V1zM9 1v4h4M6 10h4M6 12h2"/></svg>All PDF
      </button>
      <button class="btn btn-g btn-sm" onclick="S.phase='hubs';render()">Change hub</button>
    </div>
  </div>
</div>

${S.groups.map((grp,gi)=>rGroup(grp,gi)).join("")}

<div class="legend" style="border-radius:var(--rl);border:1px solid var(--border);margin-top:2px">
  <span style="font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:0.08em;margin-right:4px">Legend:</span>
  <span class="legend-item"><span class="vb v-ok" style="font-size:10px;padding:1px 7px">≥${S.threshold+3}</span> Current</span>
  <span class="legend-item"><span class="vb v-warn" style="font-size:10px;padding:1px 7px">${S.threshold+1}–${S.threshold+2}</span> Outdated</span>
  <span class="legend-item"><span class="vb v-risk" style="font-size:10px;padding:1px 7px">≤${S.threshold}</span> Critical</span>
  <span class="legend-item"><span class="type-pill tp-c4r">RCW</span> Workshared</span>
  <span class="legend-item"><span class="type-pill tp-cloud">RC</span> Not workshared</span>
</div>`;
}

// ─── RENDER GROUP SECTION ───────────────────────────────────────────────────────
function rGroup(grp,gi){
  const gProjects=S.projects.slice(grp.start,grp.end);
  let rows=[...gProjects];
  if(S.search){const q=S.search.toLowerCase();rows=rows.filter(p=>p.name.toLowerCase().includes(q));}
  if(S.statusFilters.size>0)rows=rows.filter(p=>S.statusFilters.has(pStatus(p)));
  rows.sort((a,b)=>{
    let av,bv;
    if(S.sortCol==="name"){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
    else if(S.sortCol==="ver"){av=(!a.c4rVersion||a.c4rVersion==="MIXED")?-1:parseInt(a.c4rVersion);bv=(!b.c4rVersion||b.c4rVersion==="MIXED")?-1:parseInt(b.c4rVersion);}
    else if(S.sortCol==="risk"){av=atRiskCount(a);bv=atRiskCount(b);}
    else if(S.sortCol==="mod"){av=a.lastMod||"";bv=b.lastMod||"";}
    else{av=0;bv=0;}
    return av<bv?-S.sortDir:av>bv?S.sortDir:0;
  });
  const gc=gProjects.filter(p=>pStatus(p)==="critical").length;
  const gw=gProjects.filter(p=>pStatus(p)==="warn").length;
  const go=gProjects.filter(p=>pStatus(p)==="ok").length;
  let summaryHtml="";
  if(grp.status==="pending"){
    summaryHtml=`<span class="chip chip-pending" style="font-size:10px">${grp.ptotal} queued</span>`;
  }else if(grp.status==="scanning"){
    summaryHtml=`<span class="chip chip-scan" style="font-size:10px"><span class="spinner" style="width:9px;height:9px;margin-right:3px"></span>Scanning</span>`;
  }else{
    if(gc>0)summaryHtml+=`<span class="gbadge gb-crit">${gc} Critical</span>`;
    if(gw>0)summaryHtml+=`<span class="gbadge gb-warn">${gw} Outdated</span>`;
    if(go>0)summaryHtml+=`<span class="gbadge gb-ok">${go} Current</span>`;
    if(!gc&&!gw&&!go)summaryHtml+=`<span class="gbadge gb-none">No RCW</span>`;
  }
  const grpFiles=S.projects.slice(grp.start,grp.end).flatMap(p=>[...(p.c4rFiles||[]),...(p.cloudFiles||[])]);
  const hasUnresolved=grp.status==="done"&&grpFiles.some(f=>!f.version||f.inferredVersion);
  const exportBtns=grp.status==="done"?`
    <button class="btn btn-g btn-sm" onclick="event.stopPropagation();exportCsv(${gi})" title="Export group ${gi+1} to CSV">
      <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M3 11v2h10v-2M8 3v8M5 8l3 3 3-3"/></svg>CSV
    </button>
    <button class="btn btn-g btn-sm" onclick="event.stopPropagation();exportPdf(${gi})" title="Export group ${gi+1} to PDF">
      <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 1h6l4 4v10H4V1zM9 1v4h4M6 10h4M6 12h2"/></svg>PDF
    </button>
    ${hasUnresolved?`<button class="btn btn-g btn-sm" onclick="event.stopPropagation();triggerDeepScan(${gi})" title="Deep scan: parse RVT binary file headers for files with no resolved version" style="color:var(--blue)">
      <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="8" r="5.5"/><path d="M8 5v3l2 1.5"/></svg>Deep Scan
    </button>`:''}`:"";
  const isOpen=grp.expanded;
  const th=(col,lbl,w)=>`<th style="width:${w}" onclick="sortBy('${col}')">${lbl}${S.sortCol===col?(S.sortDir===1?" ↑":" ↓"):""}</th>`;
  const pct=grp.ptotal>0?Math.round((grp.pdone/grp.ptotal)*100):0;
  const ac=grp.activeNames?.size||0;
  return`<div class="group-section">
  <div class="group-hdr${isOpen?" open":""}" onclick="toggleGroup('${grp.id}')">
    <svg class="gchev${isOpen?" open":""}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg>
    <span class="gname">${esc(grp.label)}</span>
    <div class="gstats">${summaryHtml}</div>
    ${exportBtns}
  </div>
  ${grp.status==="scanning"?`<div class="gprog-wrap"><div id="gpfill-${grp.id}" class="gpfill" style="width:${pct}%"></div></div>
  <div id="gpstats-${grp.id}" class="gpstats">${grp.pdone} done &middot; ${ac} scanning &middot; ${grp.ptotal-grp.pdone-ac} queued <span id="gpeta-${grp.id}" style="margin-left:8px;color:var(--hint)">${fmtEta(grp.eta)||""}</span></div>`:""}
  ${isOpen?`<div class="group-body"><div style="overflow-x:auto"><table>
    <thead><tr>
      <th style="width:28px"></th>
      ${th("name","Project","31%")}
      ${th("ver","RCW Version","11%")}
      <th style="width:8%">RCW Files</th>
      ${th("risk","At Risk","8%")}
      <th style="width:9%">RC Files</th>
      <th style="width:11%">Status</th>
      ${th("mod","Last Modified","13%")}
      <th style="width:5%">ACC</th>
    </tr></thead>
    <tbody>
      ${rows.length===0?`<tr><td colspan="9"><div class="empty"><div class="et">No projects match</div><div class="es">Clear the filter or search term</div></div></td></tr>`:""}
      ${rows.map(p=>rRow(p)).join("")}
    </tbody>
  </table></div></div>`:""}
</div>`;
}

function rRow(p){
  const status=pStatus(p),isExp=S.expanded.has(p.id),isRisk=status==='critical',isMixed=p.c4rVersion==='MIXED';
  const ar=atRiskCount(p);
  const verHtml=isMixed
    ?`<span class="vb v-warn" title="Multiple versions: ${esc((p.c4rVersions||[]).join(', '))}">MIXED</span>`
    :p.c4rVersion
      ?`<span class="vb ${vClass(p.c4rVersion)}">${p.c4rVersion}</span>`
      :`<span style="font-size:12px;color:var(--hint)">—</span>`;
  const chips={
    critical:   `<span class="chip chip-crit">Critical</span>`,
    warn:       `<span class="chip chip-warn">Outdated</span>`,
    ok:         `<span class="chip chip-ok">Current</span>`,
    mixed:      `<span class="chip chip-mixed">Mixed</span>`,
    'no-c4r':   `<span class="chip chip-none">No RCW</span>`,
    'no-access' :`<span class="chip chip-noaccess" title="User is not a member of this project">No Access</span>`,
    'no-version':`<span class="chip chip-noversion" title="RCW confirmed but Revit year absent from API (pre-2023 schema)">No Version</span>`,
    pending:    `<span class="chip chip-pending">Queued</span>`,
    scanning:   `<span class="chip chip-scan"><span class="spinner" style="width:9px;height:9px;margin-right:3px"></span>Scanning</span>`
  };
  const hasFiles=p.c4rCount>0||p.cloudCount>0;
  let html=`<tr class="${isRisk?'risk-row':''}">
    <td style="padding-left:10px">${hasFiles?`<button class="xbtn${isExp?' open':''}" onclick="toggleX('${p.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 4l4 4-4 4"/></svg></button>`:''}</td>
    <td><div class="pname" title="${esc(p.name)}">${esc(p.name)}</div>${isMixed?`<div class="psub" style="color:var(--amber)">Multiple workshared versions — expand to inspect</div>`:''}</td>
    <td>${verHtml}</td>
    <td style="color:var(--muted)">${p.c4rCount||'—'}</td>
    <td style="color:${ar>0?'var(--red)':'var(--hint)'};font-weight:${ar>0?700:400}">${ar||'—'}</td>
    <td style="color:var(--hint)">${p.cloudCount||'—'}</td>
    <td>${chips[status]||''}</td>
    <td style="font-size:11px;color:var(--hint)">${fDate(p.lastMod)}</td>
    <td>${p.accUrl?`<a class="acc-link" href="${esc(p.accUrl)}" target="_blank"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M10 2h4v4M14 2L8 8M3 4h3v1H4v7h7v-3h1v4H3V4z"/></svg></a>`:''}</td>
  </tr>`;
  if(isExp){
    html+=`<tr class="xrow"><td colspan="9"><div class="xinner">`;
    if(p.scanTime!==undefined&&p.scanTime!==null){
      const sf=p.skippedTopFolders||0;
      html+=`<div style="font-size:10px;color:var(--hint);margin-bottom:8px;font-family:monospace;display:flex;gap:12px">
        <span>&#x23F1; Scanned in <strong>${p.scanTime}s</strong></span>
        ${sf>0?`<span>${sf} folder${sf!==1?'s':''} skipped (non-RVT)</span>`:''}
        ${p.scanError?`<span style="color:var(--red)">${esc(p.scanError)}</span>`:''}
      </div>`;
    }
    if((p.c4rFiles||[]).length>0){
      html+=`<div class="xsec-head"><span class="type-pill tp-c4r" style="margin-right:6px">RCW</span>Revit Cloud Workshared — version locked, counts toward risk</div>
      <table class="xmini"><thead><tr>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase;padding-bottom:4px;width:28%">File</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:10%">Version</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:10%">Status</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:28%">Path</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase">Modified</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase">By</td>
      </tr></thead><tbody>
      ${(p.c4rFiles||[]).map(f=>{
        const fv=f.version?parseInt(f.version):null;
        const fRisk=isAtRisk(f.version);
        const fc=fRisk?'xrisk':'';
        const fchip=!f.version
          ?`<span class="chip chip-noversion" style="font-size:9px" title="Revit year not in API — pre-2023 schema">No Version</span>`
          :fRisk
            ?`<span class="chip chip-crit" style="font-size:9px">Critical</span>`
            :fv<=S.threshold+2
              ?`<span class="chip chip-warn" style="font-size:9px">Outdated</span>`
              :`<span class="chip chip-ok" style="font-size:9px">Current</span>`;
        return`<tr class="${fc}">
          <td>${esc(f.name)}${f.isCopy?' <span style="font-size:9px;color:var(--hint);border:1px solid var(--border);border-radius:3px;padding:0 3px;margin-left:3px">copy</span>':''}</td>
          <td><span class="vb ${vClass(f.version)}" style="font-size:10px;padding:1px 7px">${f.version||'—'}${f.versionSource==='manifest'?'<span style="font-size:9px;color:var(--blue);opacity:0.9;margin-left:2px">(MD)</span>':f.inferredVersion?'<span style="font-size:9px;opacity:0.75;margin-left:2px">(est.)</span>':''}</span></td>
          <td>${fchip}</td>
          <td style="font-size:11px" title="${esc(f.path||'')}">${esc(f.path||'—')}</td>
          <td>${fDate(f.modTime)}</td>
          <td>${esc(f.modBy||'—')}</td>
        </tr>`;
      }).join('')}
      </tbody></table>`;
    }
    if(p.skippedFolders>0){
      html+=`<div style="margin:8px 0 4px;padding:7px 10px;background:rgba(180,83,9,0.07);border:1px solid rgba(180,83,9,0.2);border-radius:5px;font-size:11px;color:var(--amber)">
        ⚠ ${p.skippedFolders} sub-folder${p.skippedFolders!==1?'s were':' was'} not accessible (403) — files inside may not be shown. This is usually the Plans folder or an admin-restricted area.
      </div>`;
    }
    if((p.failedFiles||[]).length>0){
      html+=`<div style="margin:8px 0 4px;padding:7px 10px;background:rgba(180,83,9,0.07);border:1px solid rgba(180,83,9,0.2);border-radius:5px;font-size:11px;color:var(--amber)">
        ⚠ ${p.failedFiles.length} .rvt file${p.failedFiles.length!==1?'s':''}  could not be checked (version API call failed after retries) — these may include RCW models. Check them manually in ACC.
        <table class="xmini" style="margin-top:6px"><tbody>
        ${p.failedFiles.map(f=>`<tr><td>${esc(f.name)}</td><td style="font-size:11px">${esc(f.path||'')}</td><td>${fDate(f.modTime)}</td></tr>`).join('')}
        </tbody></table>
      </div>`;
    }
    // System files (hidden or GUID-named)
    if((p.systemFiles||[]).length>0){
      html+=`<div style="margin:8px 0 4px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--muted)">
        ${p.systemFiles.length} auto-named file${p.systemFiles.length!==1?'s were':' was'} found (hidden ACC items or GUID-named files — likely Design Automation outputs, Desktop Connector backups, or internal system copies). Not counted toward risk.
      </div>`;
    }
    // Design Collaboration copies
    if((p.c4rCopyCount||0)>0){
      html+=`<div style="margin:8px 0 4px;padding:7px 10px;background:rgba(91,79,207,0.06);border:1px solid rgba(91,79,207,0.2);border-radius:5px;font-size:11px;color:var(--purple)">
        <strong>${p.c4rCount} unique RCW model${p.c4rCount!==1?'s':''}</strong> found. ${p.c4rCopyCount} additional file cop${p.c4rCopyCount!==1?'ies':'y'} exist in other folders (shared folder, consumed package copies) — these are the same models counted once. Risk metrics use unique model count. Files marked <em>copy</em> below share a model ID with another file in this project.
      </div>`;
    }
    const mdResolved=(p.c4rFiles||[]).filter(f=>f.versionSource==='manifest');
    if(mdResolved.length>0){
      html+=`<div style="margin:8px 0 4px;padding:8px 11px;background:rgba(59,130,246,0.06);border:1px dashed rgba(59,130,246,0.3);border-radius:5px;font-size:11px;color:var(--blue)">
        <strong>${mdResolved.length} file${mdResolved.length!==1?'s':''} resolved via Model Derivative.</strong> The standard API version field was absent; Revit year was read from the file's translation manifest. Marked <em>(MD)</em> in the table.
      </div>`;
    }
    if((p.c4rFiles||[]).some(f=>f.inferredVersion)){
      html+=`<div style="margin:8px 0 4px;padding:8px 11px;background:rgba(180,83,9,0.06);border:1px dashed rgba(180,83,9,0.3);border-radius:5px;font-size:11px;color:var(--amber)">
        <strong>Version estimated from file date.</strong> Files marked <em>(est.)</em> use the pre-2023 BIM 360 schema — <code style="background:rgba(180,83,9,0.1);padding:1px 4px;border-radius:3px;font-size:10px">revitProjectVersion</code> is absent from the API response and the file has not been translated (no Model Derivative manifest). The Revit year shown is inferred from the file's last-modified date and may be inaccurate for long-running projects. Use Deep Scan to attempt binary file header parsing.
      </div>`;
    }
    if((p.c4rFiles||[]).length>0&&!p.c4rVersion){
      html+=`<div style="margin:8px 0 4px;padding:8px 11px;background:rgba(180,83,9,0.06);border:1px dashed rgba(180,83,9,0.3);border-radius:5px;font-size:11px;color:var(--amber)">
        <strong>Revit year could not be determined.</strong> These are confirmed RCW files but neither <code style="background:rgba(180,83,9,0.1);padding:1px 4px;border-radius:3px;font-size:10px">revitProjectVersion</code> nor a usable modification date was available. Verify the Revit version manually in ACC.
      </div>`;
    }
    if(p.noAccess){
      const msg=S.authMode==='2-legged'
        ?'The app token was denied access to this project (403). Ensure the APS app is registered as a Custom Integration in ACC Hub Admin and that the integration has the required permissions.'
        :'This user account is not a project member. The ACC Admin API listed the project, but file-level access requires project membership. Add yourself to the project in ACC, or use Client Secret (2-legged) for membership-independent access.';
      html+=`<div style="margin:8px 0 4px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;font-size:11px;color:var(--muted)">${msg}</div>`;
    }
    if((p.cloudFiles||[]).length>0){
      html+=`<div class="xsec-head" style="margin-top:10px"><span class="type-pill tp-cloud" style="margin-right:6px">RC</span>Revit Cloud Model — uploaded without worksharing, not counted toward risk</div>
      <table class="xmini"><thead><tr>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase;padding-bottom:4px;width:28%">File</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase;width:30%">Path</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase">Modified</td>
        <td style="color:var(--hint);font-size:10px;text-transform:uppercase">By</td>
      </tr></thead><tbody>
      ${(p.cloudFiles||[]).map(f=>`<tr class="xcloud">
        <td>${esc(f.name)}</td>
        <td style="font-size:11px">${esc(f.path||'—')}</td>
        <td>${fDate(f.modTime)}</td>
        <td>${esc(f.modBy||'—')}</td>
      </tr>`).join('')}
      </tbody></table>`;
    }
    html+=`</div></td></tr>`;
  }
  return html;
}

function rAbout(){
  return`<div style="max-width:560px">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:18px">About</h2>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">Status tiers (with threshold = 2021)</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:7px 12px;font-size:13px;align-items:start">
        <span class="chip chip-crit">Critical</span><span style="color:var(--muted)">≤ 2021 — Must upgrade before FY27 Q3/Q4. Cloud Worksharing access will be revoked.</span>
        <span class="chip chip-warn">Outdated</span><span style="color:var(--muted)">2022–2023 — Not yet at the deadline but upgrade planning is recommended.</span>
        <span class="chip chip-ok">Current</span><span style="color:var(--muted)">≥ 2024 — No action required.</span>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--hint)">Set threshold to 2022 to tighten criteria: ≤2022 becomes Critical, 2023–2024 Outdated, ≥2025 Current.</div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Status — all types</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:12px;align-items:start">
        <span class="chip chip-crit">Critical</span><span style="color:var(--muted)">Version ≤ threshold. Must upgrade before FY27 Q3/Q4 — cloud worksharing access will be revoked.</span>
        <span class="chip chip-warn">Outdated</span><span style="color:var(--muted)">Threshold +1 or +2. Not at the deadline yet but upgrade planning is recommended.</span>
        <span class="chip chip-ok">Current</span><span style="color:var(--muted)">Threshold +3 or newer. No action required.</span>
        <span class="chip chip-mixed">Mixed</span><span style="color:var(--muted)">Multiple Revit versions found in the same project. Expand the row to inspect individual files.</span>
        <span class="chip chip-none">No RCW</span><span style="color:var(--muted)">No Cloud Workshared files found. Project is not affected by the deprecation.</span>
        <span class="chip chip-noaccess">No Access</span><span style="color:var(--muted)">Project listed by Admin API but file access was denied (403). See expanded row for details and resolution steps.</span>
        <span class="chip chip-noversion">No Version</span><span style="color:var(--muted)">RCW files confirmed but Revit year absent from API (pre-2023 BIM 360 schema v1.1.x/v1.2.x). Likely 2022 or older and may be at risk. Verify manually in ACC.</span>
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Authentication modes</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.8;display:grid;gap:8px">
        <div><strong style="color:var(--text)">Sign in with Autodesk (3-legged)</strong> — Standard OAuth PKCE flow. The token represents the signed-in user. File access is limited to projects the user is a member of. Projects outside membership are pre-detected and marked No Access before scanning begins. Requires Hub Admin role to list all projects via the Admin API.</div>
        <div><strong style="color:var(--text)">Client Secret (2-legged)</strong> — Uses app credentials directly. The token represents the APS application, not a user. File access covers all projects regardless of individual membership — this resolves the common failure on older BIM 360-era projects. The secret is held in browser memory only and cleared when the tab closes. Requires the APS app to be registered as a Custom Integration in ACC Hub Admin.</div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">How scanning works</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:6px">Uses <code style="font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:3px">GET /construction/admin/v1/accounts/{accountId}/projects</code> to enumerate every active project. Folder contents are fetched with full pagination. Archived projects are excluded automatically.</p>
      <p style="font-size:12px;color:var(--hint);line-height:1.7">A file is Revit Cloud Workshared (RCW) if its latest version's <code style="background:var(--surface2);padding:1px 4px;border-radius:3px">extension.type</code> contains <code style="background:var(--surface2);padding:1px 4px;border-radius:3px">C4RModel</code>. Only RCW files carry a version lock and count toward deprecation risk. Plain cloud uploads (RC) do not.</p>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Version</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <span style="font-size:20px;font-weight:700;color:var(--text)">v${VERSION}</span>
        <span style="font-size:12px;color:var(--hint)">${RELEASE_DATE}</span>
        <a href="${CHANGELOG_URL}" target="_blank" style="font-size:12px;color:var(--blue);text-decoration:none;font-weight:600">Release notes →</a>
      </div>
      <p style="font-size:12px;color:var(--hint);line-height:1.7">Versioning follows semantic versioning (MAJOR.MINOR.PATCH). v1.0.0 will be tagged once scanning accuracy is confirmed in production against large hubs.</p>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Built by</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.8"><strong style="color:var(--text)">Fernando Lima</strong> — Sr. Technical Specialist at Autodesk. Built on original work by <strong style="color:var(--text)">Tanmay Bhalerao</strong> — Senior Account Technical Lead at Autodesk, who contributed Admin API integration, 2-legged auth, PDF export, group scanning, rate limiting, and accuracy tracking.</p>
      <p style="font-size:11px;color:var(--hint);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">⚠ This is a personal project and is not official Autodesk software. It is provided as-is with no warranty or liability from Autodesk.</p>
    </div>
  </div>`;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render(){
  // Version badge — set once; VERSION and CHANGELOG_URL are constants defined in script
  const _vb=document.getElementById('ver-badge');
  if(_vb&&!_vb._set){_vb.href=CHANGELOG_URL;_vb.textContent='v'+VERSION;_vb._set=true;}
  document.getElementById('tr').innerHTML=S.uname
    ?`<div style="display:flex;align-items:center;gap:8px">
        <div class="user-chip"><div class="ava">${S.uname.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}</div><span class="uname">${esc(S.uname)}</span></div>
        <button id="b-signout" class="btn btn-g btn-sm">Sign out</button>
      </div>`:'';
  const sc=document.getElementById('sctx');
  if(S.hub){
    const tot=S.projects.reduce((s,p)=>s+p.c4rCount,0);
    sc.innerHTML=`<div class="slabel">Hub</div><div style="padding:5px 10px;font-size:12px">
      <div style="font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${esc(S.hub.name)}</div>
      <div style="font-size:11px;color:var(--hint)">${S.projects.length} active projects</div>
      ${tot>0?`<div style="font-size:11px;color:var(--green);margin-top:3px">${tot} workshared models</div>`:''}
    </div>`;
  }else sc.innerHTML='';
  ['scan','about'].forEach(k=>{
    const el=document.getElementById('nav-'+k);
    if(el)el.className='ni'+((k==='scan'&&['setup','hubs','dash'].includes(S.phase))||(k===S.phase)?' active':'');
  });
  const mc=document.getElementById('mc');
  let html='';
  if(S.error)html+=`<div class="alert a-err"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 4h1.5v5h-1.5V5zm0 6h1.5v1.5h-1.5V11z"/></svg><span>${esc(S.error)} <button class="btn btn-g btn-sm" style="margin-left:8px" onclick="S.error=null;render()">Dismiss</button></span></div>`;
  if     (S.phase==='setup')html+=rSetup();
  else if(S.phase==='hubs') html+=rHubs();
  else if(S.phase==='dash') html+=rDash();
  else if(S.phase==='about')html+=rAbout();
  mc.innerHTML=html;
  bind();
}

function bind(){
  const bc=document.getElementById('bc');
  if(bc)bc.onclick=()=>{
    const cid=(document.getElementById('cid')?.value||'').trim();
    if(!cid){S.error='Please enter your APS Client ID first.';render();return;}
    S.clientId=cid;localStorage.setItem('rvt_client_id',cid);startPKCE(cid);
  };
  const bd=document.getElementById('bd');if(bd)bd.onclick=demo;
  const b2l=document.getElementById('b2l');
  if(b2l)b2l.onclick=async()=>{
    // Read from cid2 (2-legged card) first, fall back to cid (3-legged card)
    const cid=((document.getElementById('cid2')?.value||document.getElementById('cid')?.value)||'').trim();
    const csec=(document.getElementById('csecret')?.value||'').trim();
    if(!cid){S.error='Please enter your Client ID.';render();return;}
    if(!csec){S.error='Please enter your Client Secret.';render();return;}
    b2l.disabled=true;b2l.textContent='Connecting…';
    try{
      await connectTwoLegged(cid,csec);
      // Clear secret from DOM immediately after use
      const el=document.getElementById('csecret');if(el)el.value='';
      await loadHubs();
    }catch(e){
      S.error='2-legged auth failed: '+e.message;render();
    }finally{if(b2l){b2l.disabled=false;b2l.textContent='Connect with Client Secret';}}
  };
  const bso=document.getElementById('b-signout');
  if(bso)bso.onclick=()=>{
    localStorage.removeItem('rvt_tok');localStorage.removeItem('rvt_uname');
    sessionStorage.removeItem('rvt_2l_tok');
    S.token='';S.uname='';S.authMode='3-legged';S.clientSecret='';S.tokenExpired=false;S.refreshToken=null;S.tokenIssuedAt=null;
    S.hub=null;S.projects=[];S.phase='setup';S.error=null;render();
  };
  // Close filter dropdown on any outside click
  // Inner elements call event.stopPropagation() so this only fires for outside clicks
  document.onclick=()=>{
    if(S.filterOpen){S.filterOpen=false;render();}
  };
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
(async()=>{
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(code){
    history.replaceState(null,'',window.location.pathname);
    try{
      const{token,clientId,refreshToken}=await handleCallback(code);
      S.token=token;S.clientId=clientId;
      localStorage.setItem('rvt_tok',token);localStorage.setItem('rvt_client_id',clientId);
      S.refreshToken=refreshToken||null;
      S.tokenIssuedAt=Date.now();
      const profile=await fetchUserProfile(token);
      S.uname=profile.name;S.userId=profile.userId;
      localStorage.setItem('rvt_uname',S.uname);
      localStorage.setItem('rvt_userid',S.userId);
      await loadHubs();
    }catch(e){S.error='Sign-in failed: '+e.message;render();}
    return;
  }
  if(S.token&&S.token!=='demo'){render();await loadHubs();return;}
  render();
})();
</script>
